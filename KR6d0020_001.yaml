body:
  text: 赤城沙門有嚴箋序品為二所依一實三假為教體謂聲名句文也從文立名從名立句是知名句全依於文則文為所依名句為能依句逗逗本逗遛謂止住義柔法師法華疏云逗者易義謂隨句改易不同耳然則逗只是句圓其語故爾義通長短舊説本迹二門為長義序正流通三分為短義蓋取義勢盡處以分長短若婆娑中以四字為一句八字為二句此名句少身乃短義也四句一十六字名句多身乃長義也此亦句義之流例耳若今經與疏須詳義勢齊限以分長短例知色行等體俱舍云牟尼説法蘊數有八十千彼體語或名皆色行蘊攝蓋以文句身先從眼耳所得此色攝也次方流入想行此行攝也今更依顯揚聖教論略出色行狀體色體者彼論云色謂眼所行境眼識所緣四大造色若表色為體色蘊所攝有見有對此色體也行體者謂諸行與心不相應彼復差別有二十四謂無想定滅盡定無想天命根衆同分名身句身文身等其二十四不相應行論中一一具釋若釋名句文者名是詮諸行等法自體想號假立性也句是聚集諸名顯染淨著是言説所依性也文是前二所依之性也已上正文又不相應行者釋論問云何知陀羅尼是心不應法答如人得陀羅尼雖心瞋恚而亦不失常隨人行如影隨形彼都人士出言成章毛詩都人士詩也詩云彼都人士狐裘黃黃其容不改出言有章彼彼明王也箋云城郭之域曰都古明王時都人之有士行者冬則衣狐裘黃黃然取溫裕而已其動作容貌既有常吐口言語又有法度文章疾今奢淫不自責以過差建鄴釋籤解云亦名建康即晉宋等稱為鄴都今江寧府是也舊稱楊列隋滅陳後移楊州名額過京江北江陵即荊州也故下文荊楊往復途將萬里破古不全我己句寄行約教玄義有二種一約行二約教約行者名體宗用也約教者名用體宗也玄又五重正用約行雖談教相乃是寄行約教來意釋妨或有或無來意者如提婆達多品疏云此品來意引古佛弘經傳益非繆明今宣化事驗昔不虗舉往勸今也又神力品疏云此中為付囑深法現十種大神力故名神力品記云此是別明來意自餘諸品或無來意也釋妨者如見寶塔品北人云佛為身子塔已現疏中片云此人情耳自餘諸品或無釋妨或釋名中即帶來意如從地涌出品疏中用四悉釋名已即結云是從何所來以何因緣集今以諸義釋品顯四悉之解故言涌出品釋名與義更互有無如持品疏云奉命弘經故名持而不説持義此釋名不釋義也法師功德品疏云功德者謂六根清淨內外莊嚴之功德而不解功德兩字此乃釋義不釋名也帶名以釋義如常不輕品疏云內懷不輕之解外敬不輕之境身立不輕之行口宜不輕之教人作不輕之目是也學舍養宮有人云宮應作老謂天子養老禮記云有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於東膠養庶老於虞庠當知庠序及膠皆學舍名異也養老者天子事三老五更於太學之義也伏疑伏難如彌勒問文殊偈末具釋伏疑意不以疑念對由述者別序有四初集衆二現瑞三疑念四問答而疏中只以放光現瑞而為由問答為敘而不以餘二為序故出其意謂疑念兩兼集衆疏故故云置引亦歌也謂談述如文選石季倫有思歸引班孟堅有曲引各有談述義理便作胤釋胤嗣也謂子孫也對祖父得名若作祖胤釋者則序品為子孫正為宗為祖父孫前而祖後故輔行片云可笑又迷章草或云章草二字相近認章作草此説非矣文中自云又迷章草以弄為呼此蓋片不識弄呼字耳非片不識章草也言章草者乃草寫耳故魏志云草書者始起於漢章帝時不知作者姓名云云今人習草書者呼為章草書是也今記中行之者昔見疏中草寫哢字認作呼字便作呼銷更可笑也胤徹亦爾補助譯人凡譯經有讀梵文譯語筆受潤文等別此經再譯是嚴觀二師當時謝公參譯故曰補助至安公來三分謂正教因緣分正教正説分正教奉行分須識賓主經律論藏各一為主經中又談律論為賓律經各談亦復如是如月初從淺至深之謂也六度始行如初故普曜經云進德如月初以前六義少片分義者謬足前而身後發足論本在佛世而預先製記中者昧疏中六足之言遂呼為六足論繆以發智為身攝前六足夫分科者必先總而次別如一身是總四肢是別若如古人分節用論之誤則先別而次總乃使序分為別正通為總足前身後於茲見矣鏡中越湖名王逸少遊湖上嘆曰終日如鏡中之遊也古高僧以處自名借勢用語礪作例銷非全同彼疏若過若不及論語子貢問師與商也孰賢子曰師也過商也不及注云俱不得中類古人科節繁略進退俱不能中一者唯四一者疊總科謂一者總明唯至於四一不失不差廣令智退則失略致義缺則差若四科別釋使應機契合則名不失不差然且不可準總明中廣略義來銷別文況別中即是取處中義耳一一妙中亦具四意十妙各得名為處中如因緣一釋自得處中也今十妙各處中者以具足四科釋義意故十亦入四如總明四意名處中故一觀偏收凡兩説一者觀心中因緣所生法世界也即空為人即假對治即中第一義二者觀心四悉遍收因緣等三何者四悉觀己心衆生之機為境也念念照了為應此觀也此收因緣也四悉即空藏通即假別即中圓此收四教也前之三悉始覺迹也第一義悉本覺本也此收本迹人理等四準説可見大事四一非餘感應乃至觀心四一一觀偏收等約教等三亦須遍述亦應例云大事之約教大事之本迹大事之觀心約教之大事約教之本迹約教之觀心本迹之大事本迹之約教本迹之觀心夫如是者見四科之義互相涉入一切咸妙也守株尚昧韓子云宋人有耕田中有株兔走觸株折頸而死因釋耕守株冀復得之今借類無通見者也然尚昧之人舊謂是五千起去人恐夫符文旨今謂乃是片於解經者之非耳今經本門常壽超過諸説而古師猶謂神通延壽終歸無常非守株是何故下文記云今古諸師尚不知師本迹特出諸教況弟子耶況此節記文是釋本迹一科如是片古耳一何能逮若以四釋具足方名處中則前文一一處中之義不成也然四釋共成處中是總一一處中是別不應以總而疑別何釋遠近釋應作擇相通事別神變在我則通垂形應物則別對鏡因緣境發觀則因親緣疏觀發境則緣親因疏諸教理觀三寶三攝四教及對三寶可解及施開等中即空假施權也空假即中開權也本迹各三迹門略本迹本門略約教秖云自修六度大論文意也喻如欲得無脂羊者但以狼怖之止觀云三藏菩薩初修空狼伏煩惱羊而不斷結者則無六度功德肥身此初祇也煩惱脂消功德愈肥二祇也正出假位利益衆生三祇也七地留惑潤生惑只習耳七地者止觀云人多執經云八地修出假或六地七地斷結與羅漢齊方修出假此一途之説不必全爾耳但佛為三根分別下根斷惑方能出假乃至判云此為下根也中根斷見已生死少寬思任運斷第二地名菩薩神通從此已去即能入假上根初聞佛慧即能體達見思即空已為衆生作依止處何須七地方出假耶近也今日也應作世今經已前近世始脫念念三密至念念身土皆從佛益物以説也且如逆順等者或順化或逆化或種種形種種土一一皆為衆生作入實緣耳下文云念念常為衆生作一佛乘熟脫是也舊作學者觀心義釋之非矣彼經向漸今檢本經注下文不能起住去來語言經云何名為嬰兒行善男子不能起住語言是名嬰兒如來亦爾不能起者如來終不起諸法相不能住者如來不著一切諸法不能來者如來身行無有搖動不能去者如來已至大涅槃不能語者如來雖為一切衆生説法實無所説何以故有所説者名有為法如來世尊非是有為故大字者藏也經文又嬰兒者大字也如來亦爾説於大字所謂婆和和者有為婆者無為是名嬰兒和者名無常婆者名有常衆生聞已為常住法故斷於無常是名嬰兒行不知苦樂等通也經云又嬰兒者不知苦樂晝夜父母菩薩摩訶薩亦如是為衆生故不見苦樂無晝夜相於諸衆生其心平等故無父母親疏等相不作大小等別也經云又嬰兒者不造作大小等事菩薩摩訶薩亦復如是不造作生死業是名不作大大者即五逆也菩薩摩訶薩終不造作五逆重罪小事者即二乘心菩薩終不退菩提心而作聲聞辟支佛乘等啼哭等人天也經云嬰兒者如彼嬰兒啼哭之時父母即以楊樹黃葉而語之言莫啼與汝金錢乃至答喻云若有衆生欲造衆惡如來為説三十三天常樂我淨等半字大經云譬如長者唯有一子心常憶念憐愛無已將詣師所欲令受業懼不速成尋便將還以愛念故晝夜殷勤教其半字又云譬如世間為惡之人名為半人為善之人名為滿人依義不依語依憑四法成萬行因一依法不依人二依了義經不依不了義三依義不依語四依智不依識法界次第中釋瞪視瞪文證反直視貌淨名疏中具事理二釋事釋者人目但上眴天目上下俱眴如頂生王上忉利天二王共坐唯眴有異理釋者若上眴以智就境若上下俱眴則境智符合菩薩不爾不動不眴以不二相見中道理文在疏第九或約行相如玄文第八於四教各示十乘明約行觀或約法門眷屬妙中云法門眷屬者如淨名方便為父智度為母此約法門以為眷屬也釋籤云若淨名所答正從理觀然亦得觀心名者以對事立稱觀道不專故也或從觀境如境妙四諦行妙五行約此以修觀者是故銷文例之結前修行法門二重生起也非行相法門觀境以為例三分也餘二悉爾戒慧之二悉可以習學自行教他以例三分也覩異文識一觀二十八品雖異圓觀悉同亦識昔經文同觀異如方等諦緣下智觀者得聲聞中智觀者緣覺乘上智觀者菩薩乘上上觀者得佛乘文觀俱異諦緣度文三乘各觀文觀俱同一切能詮無復異稱兼等開等昔兼但之文雖異今開會之觀成同通諸教四教通部頓漸通諸經楞伽寶積部群經別序別一部如淨名合蓋金剛般若持鉢洗足別一教如無量壽經闍王殺逆別為淨土圓教之類通序通諸經今昔五事文體大同無自等故無應作有計自然者有無中攝自然有自然無有無不攝自他共外別計無因或已入實地住或且通方小乘初果或下文謂山中多聖所居為第一義以開十門一釋名二辨相三釋成四對諦五起教觀六説默七用不用八權實九開顯十通經頓漸中祕密不定四教通塞頓如是通漸如是塞聞漸入頓通聞頓證漸塞亦可互相知通互不相知塞又四教迭論通塞乃至圓通偏塞當知爾前如是各異亦不類今經也施及開廢準此可知施三如是塞開三如是通權實遠近具知進否今昔對辨權近否實遠進權實遠近宜説出之他皆準此我聞乃至聞伴一切皆然以四例四以化法四例化儀四但看部中多少教異即知真俗為藏通法體三諦為別圓法體以分二真例説出之應更以是對向四文動俗入是不動俗入是別圓準説赴機之密三輪鑑機下地不測如將兵之術軍旅所不知祕密所用頓漸教也如戰陳得利軍方旅知比讀比音毗近也謂近讀人跛鱉馬名也其鈍如跛鱉之行筍子云彼人才性之相懸也豈若跛鱉之與六驥足哉驥謂駿馬也因緣等三各具諸教謂如是法體及三諦即不即等凡通前教十住用體折入明斷通惑與前永殊別當教空體是佛性通數具足通大地十數謂想欲觸慧念思解脫憶定受下疏中以十數對十大弟子想對富樓那欲對迦葉觸對迦旃延乃至三摩提定數對目連受對阿難非餘闕緣耳有八緣方能發識今具其八故云非闕所謂空根境作意根本染淨分別種子故唯識云耳識唯從八但除空緣空應作明若眼發識須具空緣謂塞乃無所見也若耳識者障外亦聞也如云隔垣聽音響遐邇俱可聞有人下第五記釋知常法無性中云具如釋聞中破蓋指此文不許滅後色經乃至盡合𨸩聞此片慈恩用唯識義所有名句並是識心所現如來識上文義相生更不假聞也具如私箋第五記中明世流布我隨世名字流布真諦俱云即空俱應作但亦應寄因緣等四例如疏中約觀心釋如是十事舍羅舍羅華言籌旨行十事各受一籌不受故衣律中曾一被者便名故衣不受者遠嫌疑故不同諸比丘須見即見待大衆集方隨衆見涅槃云阿難不作非時見佛釋種被殺毗樓勒王取相師惡舌之言誅釋種略盡大經四句二十一云有不聞聞有不聞不聞有聞不聞有聞聞大經顯圓輔行第九釋云聞不聞即俗而真不聞聞即真而俗聞聞但俗不聞不聞但真又不聞聞從真起應聞不聞攝應還本不聞不聞法身凝然聞聞應迹不已具銷四聞令順教意光明記銷云從聞因緣而有於聞故曰聞聞既從緣生終歸從懷此聞生滅也聞無四性當處無聞故曰聞不聞此聞無生也真諦不聞俗諦有聞故曰不聞聞此聞無量也二諦即中故曰不聞中亦叵得復云不聞此聞無作隨名便故不復次第合云隨義便故以對四教不復如涅槃四句名之次第也云隨名者只是隨名下之義耳法王啓運注淨名凡有兩稱稱應作種不説二字當説三字大經四因緣智十二因緣是一下智觀者得聲聞乘乃至上上智觀者得佛乘彼經四智以對四教亦略開等不開三時則上上時約前三文境觀互照感應一時因緣觀也空假為三教即中為圓教三觀同時約教觀也境本觀迹本迹不二本迹觀也刀疾飢如次七日月年止人壽三十時飢饉災起七年方止人壽二十時疾病災起七月方止人壽十歲時刀兵災起七日方止南名贍部方志云此中梵語也唐言輪王居處又古翻云好金地謂閻浮檀金在洲北岸海中金光浮出海上其旁有樹名閻浮檀其果極大樹高二千里圍二百里其枝葉覆一百由旬六四二萬皆感佛出時離車此云邊主又云傳集國以國多義讓五百長者遞為國主若持五戒南山鈔引五百問云佛有二身肉身雖去法身在世若敬法者便敬佛念佛若持五戒即見法身為人但至有頂凡四悉文約教對位進否不定且如三藏者五停世界總別相念為人四善根對治見道已上第一義也若圓教者五品世界十信理善生為人破通惑等對治初住已上第一義也今記中意以由三藏對治在四善根未破通惑若圓教對治在信位破惑故云今是圓教故得用之記中云斷三界惡者由疏中云永度生死流真諦事理小乘真諦所談事理前之三悉事也第一義悉理俱名事者未見中理抑之耳在無漏智四諦智斷伏不同大論婆沙之異也大論云下地諸惑因時未斷至樹下時乃以九地九品思惑通名一九故云三藏菩薩位同凡夫云云大論之意多是頓斷也婆沙俱舍云下八地惑初修禪時先已斷竟唯非想地九品思惑全在用九無礙九解脫以根勝故不復更修下八地定云云輔行評云今以一意消通令二論齊等俱舍取修禪時已斷惑竟不復更斷智論依餘部雖有漏斷未名為斷至菩提樹時但斷非想八地俱得名為無漏但是從部得名不同故使二論用義不等也劣慧為體謂味勢熟德數時量俱舍初歸敬文云諸一切種諸宜滅論疏釋云一切種者即不染汙無知所緣境也種謂種類所謂於一一境味勢熟等味謂諸法滋味或苦等味勢謂諸法損益等勢也熟謂諸法至成熟位德謂德用也數謂一二等數量謂大小等量處謂遠近等處時謂遠近等時同謂相似異謂差別然小論指此為不染汙無知若出體相凡十二家唯取劣慧為不染污無知體因果兩妙因四相者或陶師時值先釋迦以三事供養藉草然燈石蜜漿發願得記此三藏因也或言值然燈佛布髮掩泥得無生忍佛與授記此通因也或寶藏佛所行大精進此別圓因也果四相者或樹下草座三藏佛果也或大品中説共般若時十方有千佛現問難人皆字須菩提此通佛果也或寂滅道場七寶華為座華臺名報佛華葉為應佛報應但是相關不得相即此別佛果也或言釋迦尼牟名毗盧遮那遍一切處此圓佛果也文在玄文第七皆色究竟色界頂即摩醯首羅住處也舍那成佛説華嚴經凡一十處一菩提樹下説十世界海二帝釋宮説十住三炎摩天説十行四兜率天説十回向五化樂天説十禪六他化自在天説十地七初禪説十金剛八二禪説十忍九三禪説十願十摩醯首羅宮説本源華藏心地法門非謂太虗名為圓佛指劣應即圓佛舊譯經論如記中四階乃至融門皆舊譯理當所破并能論云婆伽婆能破淫怒癡所破講華嚴者唯尊我佛如李長者論引古人以華嚴十義形比法華十義如云華嚴佛身具十蓮華藏相好若説法華佛但三十二相而已餘九義具如彼文不許他經此片不識位次人也華嚴多明圓位唯識但是別位而人多不知故下文云自新譯來但以瑜伽唯識之位掩蔽華嚴圓常之説料簡中説玄文第七云已説為迹今説為本已本今迹俱迹俱本或實本權迹四句及體用乃至事理四句三者淨住即三果已去三恐是初字耳合云初果已去三三昧為對治三明在果三昧在因由修三昧之因故得三明之果苦下空行無我行即空門滅下四行即無相門集道下八行并若下餘二行是無作門若修三昧能對治見惑大菩薩神無方所如華嚴入法界品諸知識各有所住法門如和須密多女住淫法勝熱婆羅門住火法或住殺法等亦是從教謂教道關關詩注云和聲雎鳩七胥切詩注云王雎也鳥摯而有別水中可居者曰洲后妃悅樂君子之德無不諧和又不淫其色憤固幽深若雎鳩而有別然後可以風化天下也窈窕淑女君子好仇窈窕幽間也淑善仇匹言后妃有關雎之德其幽間貞專之善女宜為君子之好匹仇字詩本作逑樂而不淫詩序云樂得淑女以配君子憂在進賢不淫其色哀而不傷詩序云哀窈窕思賢才而無傷善之心是關雎之義也注云哀蓋字之誤也當為哀謂忠恕之無傷善之心謂好逑也鶚五各切雕之類也善惡王只應言王謂善惡者以上文有善惡王故以符心王有善惡義無記之舍無記多種今此文正以善惡無記分對色心因果二法善惡為因屬心無記為果屬色色謂陰也以心在色中如王居舍故文云因通善惡果唯無記若果色屬無記者如經云是身無知如草木瓦礫乃至四觀山城因緣山城約教山城本迹山城觀心如是四觀例前説之具二中舊云空即中假即中此中仍別若圓中者具空假二中今謂二中者只是空中與中中耳今此記又是釋中央之義附事為觀故説二中其旨如何以前約教有有體無體之中本迹有理本斷常之中若今開顯有體與無體本同理本與斷常無異若空即中者乃是無體與斷常中也若中中者乃是有體與理本中也以由空中是理消中義便不語假耳疏者破惡有云破三塗惡有云護法破毀法之惡今謂人天各有所住境界若或未知輒於形服而起輕慢今既列在同聞衆中破未知者輕慢之惡又兩二義義應作乘謂兩二乘語通意兼下經中發迹唯聲聞云內祕菩薩行若人天者經中無發迹之語今以內祕之通語以兼天人之有本舊消文云云菩薩濫本菩薩已其本故且不論耳因緣明觀境智玄照以明因緣觀也若境發智則因親緣疏若智照境則緣親因疏諸教開顯中即空假名為施權觀空假即中名為顯實觀及本迹觀覆迹者空假觀發迹者中道觀師弟不同尼本於大僧處得戒是則僧為師而尼為弟子近為王制只於尼處自受戒若然是有本法尼無大尼傳法能不付法藏傳二十四祖其間無尼當衆四衆之一通智辨空目連身子樓那空生如次以對通等七義唯三縱有第一義準大論意但三悉攝大小別故三教迭論大小須通始終初稟三始後入實終或本是三三悉初稟或是轉入三教次第轉入故云三藏多一云字別教同異同感報佛時同華嚴等處同一梵網戒同道種智心同中道無漏正見同次第竪入道同變易解脫四攝同事一布施攝菩薩行財法二施令衆生起親愛心二者愛語攝菩薩以軟語開喻衆生三利行攝菩薩修行利益衆生四同事攝菩薩用法眼見衆生根緣故隨有所欣即分形散影同彼事業迹在前教復同前數垂迹作藏通聲聞只名住果等也前數者如前列四種復應地在應去聲地住多此二字上慢所濫復同前數上慢者多僭濫也應化同事亦如前列但名增上慢耳具明三念與外人異性念緣真諦性異於外但緣斷常也共念處緣無漏禪異於外人但緣有漏味禪緣念處緣內外籍異於外人但緣四韋陀也三念對四悉性念處世界是第一義緣念處為人是對治共念處第一義是世界廣如彼文昔則從初至別存教門昔者多是十信中大多勝也今疏中所釋是得八相記已云大多勝也若疏中所釋別教三義且存教道邊若從證道與圓同五繫犬蛇人鬼頭繫於頸八魔十魔四魔外加苦空無常無我為八十魔者一陰二煩惱三業四心五死六天子七善根八三昧九善知識十菩提乞士怖魔準釋可見準中觀以釋也空觀活真諦假觀活俗諦名乞士空觀了煩惱即菩提假觀了結業即解脫名怖魔淨命方口食四方使命也維口食醫卜也仰口食占星月也下口食種植也除此名淨三明宿命明知過去事生大厭離天眼明知未來事漏盡明作觀斷惑故名明以明教意出其相狀玄文云乳有別圓入別圓三種二諦二粗一妙酪但二諦純粗生蘇七種二諦六粗一妙熟蘇六種五粗一妙法華但一圓二諦唯妙不粗題標為妙意在此也詮量詮應作銓漢書應劭云銓權衡也韋昭云銓稱錘也將錘就稱序其輕重也量謂斗也可以知多少二字從喻歷前二諦觀心即中真也即空假俗也十戒因緣所生法即不缺等律儀戒也即空道定等戒也即假智所讚戒也即中乃至究竟也隨數生解而於數法或作因緣生滅和合解或作數而非數解或非數而數解或作非數非非數而數而非數解即見四教解數不同大經未曾發心尚名菩薩補云此據理性一切衆生後世田者滅苦則我生已盡斷集則不受後有修道則梵行已立證滅則所作已辦佛至阿蘭若語諸比丘譬喻經云昔波羅奈去城五十里有山山中有五比丘旦入城乞食中後還山乃至疲倦不能安禪佛乃化為一道人往至其所而安慰之云云曰明旦莫乞食吾當供養明日佛為送食五人食已俱得羅漢云云故知如來非唯應供復為共應從所對治生死因果苦集是所治今兼二重前約小明後約大説無破不破三智破三惑究盡無賊不賊生死賊真真賊俗俗賊中八風南山釋云得利便悅衰惱便憂毀辱即瞋談譽即喜稱讚情悅譏刺便恨逢苦懷感遇樂生逸以後釋前何以心得自在由盡諸有結故其餘三句準説攝取事門論具列一十六句論云總別門者皆羅漢等十六句初句總餘別彼羅漢有十五種義應知一者應受飲食臥具供養恭敬二者應將大衆教化一切故三者應入聚落城邑故四者應降伏諸外道故五者應以智慧速觀察法故六者應不疾不遲説法如法相應不疲倦故七者應靜坐空間處飲食衣服一切資生不積不聚少欲知足故八者應一向行善行不著諸禪故九者應行空聖行故十者應行無相聖行故十一者應行無願聖行故十二者應降伏世間禪淨心故十三者應起諸勝功德故十四者應證第一義功德故十五者應如實知同衆生得諸功德為利益一切衆生故以釋對事攝取事門者此十五句攝取十功德示現可説果不可説果故一者攝取功德二句示現如經諸漏已盡無復煩惱二者三句攝取諸功德一句降伏世間功德如經心得自在二句降伏出世間學人功德如經善得心解脫故善得慧解脫故三者攝取不逮功德隨順如來教行故如經心善調伏故四者攝勝功德如經人中大龍故五者攝取所應作勝功德所應作者依法供養恭敬尊重如來故如經應作者作故六者攝取滿足功德滿足學地故如經所作功德故七者三句攝取過功德一者過愛故二者過求命供養恭敬三者過上下界已過學地故如經離諸重簷逮得己利盡諸有結故八者攝取上下功德如經善得正智心解脫故九者攝取應作利益衆生功德如經一切心得自在故十者攝取上首功德如經到第一彼岸故論中將十五句攝十種功德以其十多是事法故云攝取事門從初別故一句為初五句別除無明八十八中各除癡使四流欲流即欲界一切諸惑除見及癡有流即上二界一切諸惑除見及癡見流即三界見無明流即三界癡也欲有二流除見及癡當知思惑之中但舉貪慢及欲界瞋所箋並輔行文邊際定俱舍論云遍順至究竟疏云此釋邊際名也從一切地遍所隨順增至究竟故名邊際謂從欲界加行善心入初靜慮次第順入乃至有頂復從有頂入無所有次第逆入乃至欲界次第順入展轉乃至第四靜慮名一切地遍所隨順謂專修習第四靜慮從下至中從中至上如是三品復各分三上上品生名至究竟如是靜慮得邊際名疏未應有盡果縛四大羅漢迦葉羅云賓頭慮軍圖鉢嘆慧脫多退如止觀中説若世智斷惑多退若無漏智斷惑則不退若退者多至初果然退義者凡有三説薩婆多云初果不退三果有退此師謂斷迷事惑行相浮偽故退大衆部云前三許退四果定不退此師謂前三惑未盡故退經部云初果及四果不退中二多退此師謂中二果通有染無染故退是則五句望羅漢句亦成總別諸漏盡句總餘四句別涅槃是總具三德別述修性各三八自在我一能作小二能作大三能作輕四能作自在五能有主六能遠到七能動地八隨意所作入胎身子立行迦葉如人墯巖經云巖人墮如雖未至地已名死人麨先小反亦作即糗也為淨適意曰淨不了像虗記文與疏似如相背何以知之記謂不了像虗如盲以肉眼於像生著若了像虗則如開眼謂智眼開也疏中取無生智不分別如盲若取鏡像如開眼則如肉眼生著今消二説二説使同者記中不了像虗之言語勢未盡也意謂若了像虗是無生智故譬如盲也或可不字只是若字耳學者更詳鏡是助因鏡者陰界入也執心緣之乃起集業未來苦果生則是像現也寄此明因緣本辨六入寄明因緣因緣各從因緣生謂人因緣鏡因緣也若曲銷之則有四因緣也人因緣有二者一者往劫無明為因身口為緣二者父母愛欲為因赤白二滴為緣謂他父母之因緣從自無明身口之因緣以生也鏡因緣者亦二一者鏡體為因磨削為緣二者光潔為因現像為緣謂光潔現像之因緣從鏡體磨削之因緣以生也雖四因緣莫不皆如幻也今雖現文如此箋釋似若紆闊今尚疑上文似多因緣兩字若云人之與鏡皆云幻者人鏡各從因緣生則無向者四因緣之繁碎也恐傳寫者誤學者宜詳迷悟事等十界苦集為迷四聖道滅為悟諸佛得事衆生但理十信始妙覺末客塵楞嚴經云譬如有客投寄旅亭宿訖前往不住名客住名主人又云譬如新陽升天於空隙間見塵搖動動者名塵不動名空約諸三法謂變易三道也方便土三道者輔行云塵沙為煩惱道無漏業為業道變易生死為苦道實報土三道者無明為煩惱道非漏非無漏為業道變易為苦道在大在小無礙解脫大慧解脫小若顯若晦頭角者顯訥鈍者晦示訥示辨槃特訥樓那辨行等理殊或謂二十一尊者名目雖異無生行同故云等也理殊者或云三諦之理殊或云諸尊者而各掌一職道理殊或恐是行殊理等文誤也一法一事四諦法或五塵等法逆順化事神變事等思修之門若不瞬佛國乃例云從見思修若香積佛國乃例云從嗅思修然三慧之門無不以三諦為慧境三觀為慧體故云無別具如下文入第二妙樂記如此方河圖論語曰聖人受命則鳳鳥至河出圖孔安國云河圖者即八卦是也鄭玄則以為河圖洛書龜龍䘖負而出如中候所説龍馬䘖甲赤文緑色甲似龜背袤廣九尺上有列宿斗正之度帝王録紀興亡之數是也有無同異十二頭陀一蘭若二常乞食三糞掃衣四一坐食五節量食六中後不飲漿七冢間八樹下九露坐十常坐十一次第乞十二但三衣同異者律有隨坐不作餘食法及一摶食大論中無論中有節量食及中後不飲漿次第乞律中則無又律云衲衣論云糞掃律云乞食論云常乞此二名別意同已上正文今恐常乞只是次第乞加常坐為十二具十功德今且引蘭若十功德一自在來去二無我所三隨意無礙四轉習蘭若五住處少欲六不惜身命具德七無閙語八不求恩報九順禪易得十解空易其餘廣文具如彼動非自在動故無我疏云四例記謂無我今作兩意銷之一者自在動是真我今是妄我無是我故云無我二者恐無字寫誤只是字耳不暇具述諸觀次第不暇於十二頭陀中各示觀心今但於處衣食三合述三觀耳又若準前文於四釋中托事修觀今文亦合述因緣頭陀觀約教頭陀觀本迹頭陀觀觀心頭陀觀今亦不暇在學者例知無資下即移切貨也財也儒流多取無價之義故今謂無資妊娠上汝鴆切下章刃切又音申謂懷胎孕也白哲下旨熱切白潔色也昔陳武字子強白晢而鬚髮鸚鵡𠿘𠿘玉篇不出此字今恐是喙字耳許穢切其脣紅如鸚鵡之喙左傳云深口而假喙後二須用同體七淨是斷見思之法也淨名記云約界內見盡之位名見淨及度疑淨約思盡之位名分別淨及以行淨等言同體者登地方爾記又云若依別教界內外見思除處皆有前後易可相例登地同體理非前後於別教中雖後入地仍分見修前後之別圓教一向初後不二已上正文縈衣上於營切嚴飾衣裝耳蠕動上而允切淮南子云蠕動蠉飛謂蟲示彼佛此中有三字似誤示應作爾彼佛二字似多六界或云地水火風空識或恐是六根或是六凡界未檢經萊茯根萊應作蘆茯應作蔔音服又音蔔菜名也俗訛為蘿蔔善知法相寫倒恐是善知相法如善等法六藝如釋籤籤但列名而已今取周禮略箋六謂禮樂射馭書數周禮保氏云掌養國子教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數注云五禮吉凶單賓嘉六樂雲門大咸大韶大夏大濩大武五射白矢參連剡注襄尺井儀五馭鳴和鸞逐水曲過君表舞交衢逐禽左六書象形會意轉注處事假借諧聲九數方田粟米差分少廣商功均輸方程羸不足旁要成破法輪恐是目連以神通破調達逆惡身子説法回五百衆心成就和合助佛法輪更須詳有作距峨有作𡶅峨唯峨字五何切餘三字玉篇不出只作簸峨音耳江海賦者乃郭景純江賦陽侯者注云波神也硪音我江波湧起如岸若從元初但聞乳酪寄二教比顯別教中理耳綖音延今應作線或作線心意識輕重心輕澄方發通上太子膝上輪王有千子遂化為其一欲令父王愛之文在增一阿含四十七生穢生瑕穢謂犯戒自污也然今文七佛弟子生穢年數三與律異或部別或寫誤今與律文校讎毗婆尸佛今云八萬四千年後律云一百年後尸棄佛至拘留孫三佛年數律同拘那含牟尼佛今云四十律云三十迦葉佛今云一十律云二十釋迦佛數同十四變化初禪二變化一變自地二能變至欲界二禪三變化四禪五變化以神通皆變自及地能變下準説可見必得滅受想定止觀云滅非想非非想三種受想以成解脫説云三受想者若有識想觸想及虗空想若修無想永滅此想想雖有三並是所滅餘心所亦滅但云滅受想者此二勝故云云觀禪九想八背捨八勝處十一切處練九次第定熏師子奮迅三昧修超越三昧前二可破壞或云通依生身若灰身入滅義當通壞或云若破無明前二教通一切轉變以大奪小義之如壞前二在教道後二在證道藏通二教教證俱權合為教道別圓在證道者且語發得後二通三世如華嚴經無作神通能入過去及以未來各無數劫前二聖位方修若以四如意足是神通家體本凡位時修也如調達凡位修而得通今言聖修恐是超人隨依依真勝依依中疏採穭櫓力與切田中自生稻也然則櫓非麻類經云捨麻縷取劫具經無櫓字只作縷不得手障形外道邪計而經中只出計相不述計意今文少誤以本經校之自可見矣長阿含第八云佛告尼俱陀梵志云汝所行者皆為卑陋離服裸形以手障蔽記云不得手障形是也不受瓨食字誤正應經記並作瓨集韻瓨作缶下江反缶同廣韻𨥯缶同不受杵食杵音盂不受兩壁中間食記云兩臂不受二人中間食不受兩刀中間食不受兩杵朽盂音同經記並上杵非也作杅字中間食不受共食家食不受懷妊家食見狗在門則不受其食不多蠅家食不受請食不食魚不食肉不飲酒他言先識則不受其食記先言義者經中是識字不兩器食一䬸一咽至七䬸止受人益食不過七益記云三度去經文與記大略是同但記云臥糞經中云臥牛糞異耳疏粳糩糩空外切字書云粗粳皮謂糩當知粳與糩內外粗細之別疏進止共俱進止行住也共俱謂不離宿護明相迦絺那此翻功德衣即二十五條坐夏有功者得宿復不定西方云昴畢觜參井鬼柳荊溪云應是地異故星移三位根塵房舍以識於根塵中住故指之以為房舍今分別能住房舍之心體是佛性故云也非塵為佛性半頭而發謂但見前而不見後故曰半頭故楞嚴揀那律云見性雖洞然明前不明後四維虧一半云何獲圓通疏不二相淨名經云有佛世尊得真天眼常在三昧見諸佛國不以二相疏釋云中道真天眼非二諦相又云今取證理見十方土及十法界粗細之色名佛天眼圓見三諦無二名為佛眼有口失緣昔以口錯失誤證他事今招誤報嘗撿金藏經才及九卷尚未見緣有訶梨勒唐本草云出西域及交廣地主風虗熱氣形似捺黃色核圓作六七楞又云形似胡桃核似訶子貝子真珠也一切法不忍舍利弗本末經説初來難佛云一切法不忍佛以一句責云汝見是忍否思惟于久不得一法入心乃云瞿曇著我置兩門中若我答忍是負門粗衆人皆知云何自言不忍而今言忍現見妄語若答言不見是忍是負門細無人知者即便答言是見亦不忍佛言不忍是見將何破他衆人無異何用自高輔行云此即屬單四見中非有非無見攝十一事摩刷覆瘡痍放煙及茂草安隱并渡處等法眼淨本在初果次云阿羅漢果或眼淨遍餘果後必得前疏如止觀中人行理等彼第三云觀心善知識者大品云佛菩薩羅漢是善知識六波羅蜜道品等事是善知識法性實際是善知若佛菩薩等威光覆育即外護也六度道品即同行也法性實際境能發智即教教也宗社宗尊也謂尊貌所居也社即后土國語云戴皇天履后土地不可盡敬故封為社住恐離車怨若於闍世國中入滅則離車人怨若於離車國中入滅則闍世人怨諸能破障邊生善之義未合云破若詳下文記云前八障義小異者謂胎障宿世常障為疑所障等文今此文中似多一破字若對治可云破耳今銷能所之相為世世障我是能障邊世世能捨是所破障邊惡聲盈路是能障邊變坑息謗是所破障邊沙彌之年多妄語是能障邊後當實語是所破障邊言多者諸文中多含今從強判故云多也蓋諸障文或兼一二三悉故餘準可知七八九十障準一至六可知歡喜丸通慧僧録云西域作以供養天人亦有自食者今此土作油熬虗漲空中粧綵色為糷也順正云用蘇油作細切麵如梧桐子大將砂糖油為心油煎麵從外褁之以為丸也六日不看婆羅門大論云羅云昔為國王期看仙人王著樂遂忘仙人六日在外不得飲食柔公法華疏云昔有國王生二太子長名日王次名月王父王崩已日王治國月王出家王出家已後於道行往渴飲池水飲已悟曰今日犯盜也即詣王所乞依法治王曰水者無主物耳何有盜罪因令後園修行王遂忘記經于六日不得飲食因是飢餓等佛言仙人者我身是也是時王者羅云是也王出家者即婆羅門中出家也神寶至紹輪王位須七寶至謂馬象金輪臣女珠兵等寶寶雲經第七記十六羅漢此經一十卷曾撿五六七八卷不見其説或在他經也若十六羅漢各有名目華梵住處眷屬是如來滅後慶友尊者造法住記指之交好好去聲以道義相好樂也故春秋中王者與鄰國交通謂結好隱德對治如以外三術隱德以內三術自修十八種學人俱舍中十八學人謂四向三果信行法行信解見得家家一種那含又五那含謂中生有行不行上流般九種無學人一退法遇少緣退所得法二思法恐退失故三護法於所得法防護故四安住法亦不增進五堪達法好調練速達不動六不動法前五有退此一不動七不退八慧解脫九俱解脫五方便外凡一內凡四舉因六人師子吼菩薩白佛言何等比丘能莊嚴雙樹佛舉六人經若有比丘受持讀誦十二部經正其文句如是比丘乃能莊嚴雙樹師子吼言如我解佛所説阿難即其人也那律迦葉須菩提舍利弗目犍連云云因人與果人皆具四德故莊嚴雙樹三觀五句空五句者知本性空名無學常觀性空名學念念相續無不空時名無學學雖常觀空而無空可得名學無學假五句者知性德俗名無學稱性而觀名學而能觀中了恆沙法名無學學俗諦體虗名學無學中五句者觀中無中名無學中體周遍無所不在名學心常住中名無學學中亦自忘名學無學三觀皆以雙非為第五句用對十界相具十謂地獄相具佛相地獄報具佛報中間可知餘九各具準説上下悉然悉作此以明本迹釋妨如前前文云豈可俱是從本垂迹疏溫良恭儉論語子貢答子禽云夫子溫良恭儉讓以得之疏釋云敦柔潤澤謂之溫行不犯物謂之良和從不逆謂之恭去奢從約謂之儉先人後己謂之讓可云多學學應作識義通初後五品六根各六千功德五六以為初後十種六根謂六根各十華嚴五十六云菩薩有十種眼謂肉眼見一切色故天眼見一切衆生心故慧眼見一切衆生境界故法眼見一切法如實相故佛眼見如來十力故智眼知見諸法故光明眼見佛光明故出生死眼見涅槃故無礙眼所見無障故一切智眼見普門法界故其餘五根各十亦爾一人關多人如七聖共化一慳婆羅門之類多人關一人如三迦葉各一為師而各有所化弟子之類一人關一人如迦葉童女破弊宿之類多人關多人佛及弟子共化多人主伴顯密在釋種中出家者顯在外道中出家者密師之顯密也而師之顯密中各有弟子隨師之學弟子之顯密也事理權實或事權理實或變造事中寂理三教權圓教實此之四字收羅諸法任意説人法或三乘人諦緣度法或假名人五陰法等隱顯善惡祕密化隱彰灼化顯四聖善六凡惡疏分庭抗禮抗謂對抗賓禮也臣子則不然莊子云孔子問道於漁父子路旁車而問曰由得為役久矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭抗禮夫子猶有倨傲之容今漁父杖拿逆立而夫子曲腰磬折再拜而應得無言太甚乎偏圓如玄文分別玄文云偏圓與權實如何答偏圓約教權實約法贖命如釋籤彼引涅槃十四云如人七寶不出外用名之為藏是人所以藏積此寶為未來故所謂穀貴賊來侵境值遇惡王為用贖命諸佛祕藏亦復如是為未來諸惡比丘畜不淨物為四衆説佛入涅槃如是惡時為説是經是經若滅佛法則滅猗數猗音依除也七覺中乃除覺分也華嚴經中七覺中立猗覺分不立除覺名疏想得假名於凡聖起想得善惡之名疏動發取境修天眼方便也初取一四天下漸漸小千至大千界同時異時王數成論師謂同時起毗曇師謂異時起信具諸數如信聞法解佛性以由信故進由信故念乃至由信具戒從強受名且名於信耳乃至戒具諸數亦爾因戒故信因戒故進因戒故念等從強受名且名於戒等十通心所上文十善心所從強受名如向若通大地數準十善數從強受名可解展轉相扶信扶進進扶念念扶定乃至戒亦爾定扶念念扶進進扶信故曰相扶強為觀境如貪欲重以為觀境觀之不已欲若滅者嗔癡隨去法不住法中法者禪波羅蜜中謂心數法也若三際求心不可得亦三際求法不可得法不自住等因心所盡如經云永斷無明方成佛道因果名同因果皆名五陰而有汙穢法性之別能忍成道事菩薩入五道教化衆生能行忍者是成佛因大論菩薩文具三教心不可動知一切空也能忍者如歌利王是成道事也不斷等者不斷善根不破菩提心共別有無共謂二蘇有列三乘別謂阿含不列菩薩華嚴不列聲聞義當三觀與薩婆相應者空也遊戲神通假也即坐道場中也並有二意於二味中得入實者進與盈也以生蘇對通熟蘇對別退與縮也各有八萬各應作合六境略不語無諦六中初四諦境離五障一惡道二邊地三諸根闕四女身五知宿命至此名上忍三祇百劫對賢位者初祇總別相念二祇暖位三祇頂位百劫下忍出家降魔中忍次一剎那入上忍若論百劫本是下忍今云上者或三忍合説句論所出不同或寫誤住後兼別彼經初住圓融二住至七住又存隔歷七住中又有一多相即之相至行住地又有次第荊溪云故知兼用圓文接別賢首品法慧答云此義甚深難説難知分別難信難解難證難行難通難思惟難量等記中道字誤一即多多即一彼經云為欲了知仰世界即覆世界覆世界即仰世界多世界即一世界一世界即多世界故發菩提心一念即無量念彼經云為了知一念即無量念無量念即一念故發菩提心又云一念平等與不可議劫平等於一念中盡知前際後際寄本寄別次第為圓不次之張本耳順論法華論云攝取事門示現諸地攝取勝功德不同二乘功德八地無功用智九地中得勝陀羅尼十地中不退轉法輪得佛受用等疏云何七地更起二乘心前文云七地猶起二乘心疏五地得深禪定華嚴中以十度對十地五地正修禪定字等語等大品四十二字南嶽禪師釋云言字等者皆名法慧乃至金剛藏亦如是言語等者十方諸佛説十住與法慧説等乃至十地亦復如是又一切字皆是無字能作一切字是名字等發言無二是名語等自利利他有無雙照自利照無利他照有此一往偏對仍須自他有無皆照有無者空假也不退轉三句自利也轉法輪一句即利他也若福若智供養佛福也餘是智內外因緣到彼岸內因名聞外緣也郎初四句隨義思之廣韻即與即同雖不同瓔珞彼經云從假入空觀亦名二諦觀從空入假亦名平等觀二觀為方便得入中道第一義諦觀乃至入初地法流水中名摩訶薩諸經非無華嚴亦云八地入無功用去取俱得初地證道故取八地教道故去疏應作所作應以何身應説何法中道是法音陀羅尼籤云中道實相名為法音中道法作內體方便謂初住破無明得真法音故佛為身子開一句義端如前記中略示或隱或顯凡聖逆順等或真或俗出家在家不起法相法相俗不起非法相非相真三止為足體真止謂體妄即真方便隨緣止謂心隨理息二邊分別止空邊如止假邊如不止中道不當空假二邊調象大經云以大鐵鉤鉤擉其頂即時調伏惡心都盡末濟跛兔西域記説有一林野為火所燒衆獸皆奔唯一跛兔不能自濟而菩薩因地曾濟跛兔火難疏云一千四佛記云唯除一人記文且略讀者難曉今撿彼經以廣之經中説寶海梵志有三億弟子除一千人其餘同聲發願於此世界即寶藏佛所王世界也名刪毗嵐同成阿耨多羅三藐三菩提寶藏如來次第授記所記者謂毗婆尸尸棄乃至最後成佛者名毗婆沙已上二億九萬九千人並於刪毗嵐世界次第作佛其餘千人非是輪王千子也若輪王千子並在他土成佛今此千人者是三億弟子中所除一千耳悉皆讀誦毗陀外典其中大所宗仰者名婆由毗紐紐白佛言我願於五濁惡世成佛寶藏記云東方去此一佛世界微塵數等佛土有世界號袈裟幢汝於彼土成等正覺號金山王唯除一人者此是也第二弟子名曰火鬘發願求記彼佛言汝於來世有世界名娑婆劫號賢劫有千世尊出現於世人壽四萬歲時最初成佛號俱留孫彼佛滅後人壽三萬時第二弟子成佛號迦那含牟尼第三弟子成佛號迦葉等云云如是共九百九十九佛次第成佛是時寶海漸漸却行有五侍者勸發心已亦次第授記第一號堅音第二號快樂尊第三號導師第四號愛清淨第五號那羅延勝葉云云以此五侍者足前九百九十九佛共一千四如來次授輪王千子經中無諍念王一千人者經云寶藏如來一一為授菩提記別同共一時各於異國成無上道異國者謂非娑婆也佛告無諍念王西方去此百千億國有世界名安樂汝於是國當得作佛號無量壽云云其餘千子次第與記與今文同方等列地獄者方等陀羅尼經云爾時婆藪從地獄出將九十二億諸罪人輩來詣娑婆世界十方亦然文殊語舍利弗此諸罪人佛未出時造不善行經歷地獄因於華聚放大光明承光從於阿鼻地獄而出快説斯義曉了衆生彼經偈云一切行無常識為外塵法起者必有盡彼滅量為樂乃至云利根衆生等一聞不再受斷以智慧劒如火燒山野故云曉了易悟等或在有對乃至或不可見此四句並是經文然彼經中四句之下各有一法字如云或在有對法等今略彼經逐句解釋經中先解見法佛云可見法者為眼見色為色入眼定化王菩薩言亦不眼見色亦不離眼眼亦不入色眼亦不離色云云乃至云識非無為不離無為佛又問何謂有為何謂無為菩薩答言起者有為住者無為於第一義法不見有起不見有住法性清淨無色無識於泥洹法無所深著眼非色色非眼無可見法無不可見法云云菩薩又言今欲聞如來説有對無對法佛言聲為有對耶為無對耶菩薩言亦有對亦無對佛言有對無對云何族姓子此聲彼應為有為無為虗為實虗空可畫得成字否對曰唯然世尊不可得也有對下至即餘鬼界並記主言或在有色至非無想是經中文有色即欲色下又是記主言或非有想欺罔取他猶如蒲蘆取彼桑蟲以為己子若徵其因或是以親認義寄死托孤誣罔相承非本宗繼棄本蒸嘗名非有想非無想和合怪成食父母想如土梟鳥附塊為兒及破鏡鳥以毒樹果抱為己子子成父母皆遭其食此則怨中有愛名非無想下三空處不云非非想者準大論是長壽天八難中一或且一往指下三空處耳乘戒細論此疏釋同聞衆之末亦略論其緩急與淨名疏同漚和出假智也梵音耳相去各十千向下俱舍論文取論疏略箋之疏云從水際盡初層中間相去十千由旬乃至三層各相去亦爾旁出十六千初層從須彌旁出十六千第二層八千第三層四千第四層二千並約由旬以論千數外四苑莊嚴城外四面最勝可愛處有四種園一衆車園二惡口園三相雜園四歡喜園四級各十住處須彌四級如持鬘天居一級自有十住處二象天三常恣天四箜篌天亦各有十住處三肘半每一肘一尺八寸倍倍增如次東州八肘西洲十六肘北洲三十二肘欲天俱盧舍四分一一增一分增四肘四肘為一弓亦名一尋五百尋為一俱盧舍亦名阿練若八俱盧舍為一逾善那四天王天長一俱盧舍四分之一三十三天長四分之二夜摩天長四分之三兜率天長四分化樂天長五分他化自在天長一俱盧舍半色天逾善那亦名由旬初四增半半梵衆天身長半由旬梵輔天長一由旬大梵天長一由旬半少光天長二由旬此上增倍倍無量光天長四由旬光音天長八由旬乃至遍淨天長六十四由旬唯無雲減三遍淨天既長六十四由旬此無雲天合身長一百二十八由旬既云減三由旬只長一百二十五由旬耳此後福生天更倍倍增乃至色究竟天身長一萬六千由旬上五倍倍增人中一百年三十三天一晝夜以此日夜一千年為彼天壽量例知夜摩天等次第如此人中二百四百八百十六百為彼一日一夜以此等日夜二千四千八千十六千等次第以對餘四天色無晝夜殊以俱牟頭華有開有合諸鳥有鳴不鳴以等事判為晝夜劫數等身量若諸天身量半由旬則壽量半劫身量一由旬則壽一劫乃至色究竟身量一萬六千由旬則壽計一萬六千大劫無色初二萬後後二二增空處二萬識處四萬無所有處六萬非非想處壽八萬劫少光上下天大全半為劫少光已上約大劫論也少光二大劫無量光四大劫極光八大劫少光已下約半劫論也半則中也大梵天六十中劫梵輔天四十中劫梵衆天二十中劫並約大半以論諸壽量一一天如去下量俱舍頌云如彼去下量去上數亦然如四天王天去下海量四萬瑜善那去上忉利亦爾三十三天去海八萬瑜善那去上夜摩天亦爾乃至善現去海上去色究竟亦爾四大河殑伽河恆河新頭河縛芻河各繞阿耨達池七匝然後入海緊既四教以四對四三藏奏生滅之法通教奏無生故妙別教奏恆沙法故大圓奏一總諸法故持然一音之奏四教隨聞故曰可解般遮于瑟法顯傳翻為大會四乾對教藏則界內事教菩薩以拙度度物如鍾鼓之有形量故名樂也通則界內理教談巧度度物如聲不見名樂音也別則界外事教以俗諦度物度物既廣名美也圓則界外理教音聲性空離有無名為美音五性宗即升州護身寺法師所立一因緣宗二假名宗三不真宗四幻化宗五法界宗無明等種子初師據現行説五住也五性師沒前現行將見疑無明等各有種子合為一無明住望唯識等今宗談五住大略與唯識同但不談八識有含藏惡種子為異蓋八識有種子者義多屬別曆數尚書帝舜謂大禹曰天之曆數在汝射注曆數謂天道也舜善禹有治水之大功言天道在禹身終當為天子應是變身華嚴經云阿修羅王本身只長七百由旬懼諸龍上之葉切謂驚也相貌幾同幾音寄謂僅也書云人生幾亡迦葉於涅槃不堪付囑彼經第三云若以法寶付囑阿難及諸比丘不得久住何以故一切聲聞及大迦葉悉當無常應以無上佛法付諸菩薩也説偈讚佛粗言及軟語皆歸第一義等不信六臣六師之言梵行品中阿闍世王殺父之後心生悔熱時有六臣白王莫愁各言所事其所師者皆是外道謂殺父者無有果報其第一臣名為月稱師名富闍那第二臣名為藏德師名末伽梨拘賖梨子第三臣名實德師名刪闍耶毗羅眩子第四臣名為悉知義師名阿耆多第五臣名為吉德師名迦羅鳩馱迦旃延第六臣名為無所畏師名乾陀若提子云云最後臣者名曰耆婆勸王近佛佛為説逆罪本空得無根信等疏涅槃經一句彼經云於乘緩者乃名為緩於戒緩者不名為緩大小乘別彼疏云還約信法各有大小信行大者昔聞大乘乘戒俱急今以人天身聞大次信行小者昔聞小乘乘戒俱急今以人天身聞小若法行大小準説可知故記云隨所習大小耳漸頓者大小各有漸頓今記文與彼疏語意少異彼云頓漸各有信法頓信行者如華嚴人天聞大頓法行者過去學大修一心三觀也若漸信者既無華嚴之益由有漸機聞藏等四味初作二乘歷方等般若云云已上並彼文也若銷今文可取約教以論漸頓則以圓為頓三教為漸或説大説小各有得四教之益不定根性隨類各解皆由宿習故爾應迹者菩薩垂形現四趣人天等身引戒緩乘急及乘戒俱急之類亦為信法大小漸頓引無數衆來至佛所觀心者彼疏云若觀行人大小兩乘乘戒四句受何等身得見彌勒聞何等法若無禪觀讀誦説法即成信行乘戒緩急可知等已上正文然前諸義中既有法行已是觀心於義即足何故今第六文又立觀心耶前有法行判屬他機第六觀心乃約己利亦是前五判過去六七判未來化他者疏云若觀行講説應當自省心行用此四意分別得失即見所化之者行業不同未來升沉宛然可知當以此意而化導之為欲遍通通別故爾記主敘通別二序種種不同者使學者通曉之入定義兼開合無量義處三昧無量者論開處之一字論合雙緣過現何緣有瑞緣現也惟文殊可知緣過也三同日月燈明佛亦先頓而後漸此與今已同彼佛亦有此土六瑞他土六瑞與今今同又彼佛從三昧起説法華經與今當同爾後本經無爾乃此經云爾乃得如是爾乃得成佛而破光宅四一本光宅所用此中自立四一以破光宅逆順無表又況光宅釋下六瑞只作三雙又無表報瑞若無表用四一為尚未名一三外之一非即三之一念念四一法身理一般若行一解脫教一具三德者人一色香四一色空空色非空非色體是三德故是四一也香亦準知今家多依論文但一兩處不全用耳下文判分別功德品從品初訖十九行偈為本門正宗而天親判分別功德品為餘殘修多羅謂是流通此一處不用也又分別品中受記得無生忍天親判為初地疏云專據別義亦不會經此一處亦不用也天龍等四加人鬼梵魔等四加沙門婆羅門大小客舊有大乘根性小乘根性有他方來如客者本土如舊住者微著共別在凡名微入聖曰著通乘之共別法之別兼獨昔兼今獨外小權迹外有四德之名望正還成於倒惑小存二諦之號望大猶是於無明別教報佛形實為權迹中之本望本是迹故結云並有名無實三達三明容預從容也中我可發有人作八自在我於今可發有人云我字誤應作義謂中道之義可發今謂中字應去聲呼言我者乃佛自稱此屬應也發者屬機如是妙機來至今經可中佛發爾前則不然也故第七記中亦云以後驗前驗昔可中下文中字與今同音諡法時至切昭生者之迹以易其名曰諡然諡法有善惡焉若善諡者如翼善傳聖曰堯惡諡者如逆天虐民曰惕之類聞慧尚無至五品六根三慧本在賢位今云無者取三慧證在十住也五品為結緣若約正修觀法本是當機由觀心文附約教釋故爾意具斯二疑念與身口玄文開合迹門開因合果本門開果合因玄文通收香風地淨玄文風地二瑞表理乘二妙是華瑞中開出若論合者只是四華一端攝耳故云但是開合也當知通是華瑞別表三妙若云彼此六瑞者玄文見萬八千士表感應修行表利益此二表報乃至取他土二瑞共表十妙今疏中只就此土六瑞中表於十妙故云此土自足凡諸取文皆有通別疏取今文六瑞玄取他土六瑞雖於風地開為二瑞合但為耳炫耀上王絹反下戈照反炫耀並自明之義也上聖下凡義同感應光中見他土六趣名下凡與此感同又見他土諸佛説法名上聖與此應同人法與説法義同及聞諸佛所説經法與此土説無量義是同唯始終中終同應息以見他土佛涅槃者與今佛化畢入涅槃亦是同菩薩行行復同於果光中見彼土菩薩行行與此土雨華表因是同又下偈中菩薩行行皆云以求佛道與此土動地表果是同淨應具七疏中但二淨而已七者一戒淨二心淨三見淨四斷疑淨五分別淨六行淨七涅槃淨戒淨為始涅槃淨為終數有大小三祇者俱舍之小數也若善戒經三阿僧祇者華嚴十地品云諸佛正法如是甚深如是難得論釋云難得者三阿僧祇證智觀此此大數也不資下即移反貨也今取訓無盡也文選古詩云受恩良不資妄破古師古師何嘗將般若以為無量義此印公妄破耳偽帝東晉時一十六國各自蜂屯虎踞擅立為帝晉太元年中姚萇者即其一也自稱後秦萇本是前秦符堅之將位非正統凡僭號曰偽武當山今京西均州但加與一破二破三即是無二無三故加與一之字乃異無二無三之句無量義是法華異名取處字也下文自釋法華論十七種名一名無量義二名最勝修多羅三名大方廣四名教菩薩法五名佛所護念六名一切諸佛祕密藏七名一切佛藏八名一切諸佛密處九名能生一切諸佛十名一切道場十一名一切諸佛所轉法輪十二名一切諸佛堅固舍利十三名一切諸佛大巧方便十四名説一乘經十五名第一義住十六名妙法蓮華十七名為法門能生不違論無量義是法華異名故皆諸教流出今經前圓一實之理而各流出諸教差別此語似倒應云一實之理皆流出諸教如圓覺經云佛有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜故於獨一生於兼一法華獨一之圓生於華嚴兼別之圓方等兼三般若兼二之圓然獨一終無二一為取逗會施出無量故云兼一耳神通延壽光宅云前過恆沙後倍上數但是神通延之耳百非者彼經略列三十四非彼經云大哉大悟大聖主無染無垢無所著乃至云永斷夢妄思想念無復諸大陰界入其身非有亦非無非因非緣非自他非方非圓非長短非出非沒非生滅非造非起非為作非坐非臥非行住非動非轉非間靜非進非退非安危非是非非非得失非彼非此非去來非青非黃非赤白非紅非紫種種色戒定慧解知見生三昧六通道品發所攝成處三千具攝法身故常所安立處我義周遍故曰安立滅有相處二邊即中本性無染不住身心相處陰入皆如是中道樂悉皆有結華嚴經以梵網結乃至涅槃經以像法決疑結不墯諸數淨名疏云法身智德無為非界內外有為即無二種陰入數法豈有界內陰入法依此有疾即破三藏生身之佛猶有果報陰界入諸數故有疾序正並常序常者如螺髻梵王訶舍利弗云仁者心有高下不依佛慧故見此土為不淨耳菩薩於一切衆生悉皆平等深心清淨依佛智慧則能見此土清淨云云正常者以經多明三脫常住法問疾品經云此室何以空無侍者居士答言諸佛國土亦復皆空又問何以為空答曰以空空又問空何用空答言以無分別故空又問空可分別耶答分別亦空疏云以無分別故空者本性空理是一故分別亦空者本性自空妄生分別不二法門明中道常經云生滅為二法本不生今則無滅得此無生法忍是謂入不二法門經中常文甚多皆常體也常家之用經云諸佛菩薩有解脫名不可思議若菩薩住是解脫者能以須彌高廣內芥子中用文亦多觀衆生佛道以空假顯中疏總科云觀衆生品是從假入空觀佛道品是從空入假觀從假入空觀者衆生品云如幻師見所幻人菩薩觀衆生為若此也如智者見水中月如鏡中見其面像等云云從空入假觀者佛道品云云何菩薩行於非道維摩詰言若菩薩行五無間道而無惱恚乃至現於涅槃而不斷生死等云云香飯體常維摩詰語舍利弗言仁者可食如來甘露味飯大悲所熏無以限意食之使不銷也乃至云四海有竭此飯無盡等菩薩行去復宗明常行去者從菩薩行品洎阿閦佛品等復也言復宗者求佛印定佛國因果之事也以此經從問疾品已下廣明佛國因果悉在淨名室中今一期事畢須求佛印證於是居士掌擎大衆詣菴羅園至於佛所故疏云佛國因果大士助宣此義殊辭異辨若不還歸求佛印定物或疑網不除是故須歸佛所復宗明義故師資相對復宗敷演更明佛國等正宗始末俱常疏云正説中為三段一佛國品是如來當宗演暢二方便品去是大士助宣聖化三從菩薩行品去至阿閦品還歸佛所印定成經云云故取佛國為始阿閦為末故云始末正宗既常始末但常諸部何別三分俱常是則今經與淨名等若無有異五時自分玄文云教相為三一根性融不融相二化道始終不始終相三師弟遠近不遠近相因而次第辨五時五味與法華同異異謂兼帶同邊不殊等覆別以從通覆法華三昧之別名且從無量義之通號結緣義同通化句絶昔人以通化二字節在下句非矣今謂王子説法覆講結緣與羅云住世十方應供護持像教類例相近故曰義同而不比王子專於説法云通化耳靳固禮記云今衆人之命儒也妄常以儒相詬病鄭玄注云妄之言無也言今世名儒無有常人遭人名為儒而以儒靳故相戲杜預云戲而相愧為靳禮記作故竹林七賢傳云嵆康臨刑顧視日影索琴彈之曰袁孝尼嘗從吾學廣陵散吾每靳固不與廣陵散於是絶矣華嚴等經以聲光集衆華嚴經云毛孔之中出化雲光明普照於十方又云大音震吼遍十方普為宣説寂滅法十方佛子等塵剎悉共歡喜而來集涅槃經云以佛神力出大音聲其聲遍滿至於有頂又云從其面門放種種光於是大衆悉集況四十八通等三教各一十六須對比丘等言之此似釋疑既片古人四衆非比丘等四自云發起等四攝比丘四故反結云因古述四疏習種性等戒疏云習種性者習以性成性種性者因前習種以成此性道種性者能見中道故聖種性者性道現前故三因大異諦緣度殊故因大異俱斷見思三乘徵異故果小同開前合後涅槃經喻也三十三天同服甘露如四十二位同證實相開前者住行向各十合後者十地一等覺一妙覺一十四般若涅槃經説月愛三昧從初一日至十五日光漸增長又從十六日至三十日光色漸減光漸增者譬十五智德光漸減者譬十五斷德言十五者三十心合為三智斷十地開為十智斷等覺妙覺各一智斷合十五智斷妙玄云何得知月譬位耶答仁王明十四忍三十心為三般若十地為十般若等覺為一般若十四般若在菩薩心中皆名為忍轉至佛心中名之為智今更節仁王五忍對十四般若使玄文易識伏忍有三謂住行向也信忍有三謂歡喜地離垢地發光地修佛知見成無上覺順忍有三謂焰慧地難勝地現前地能斷三障利樂衆生無生忍有三謂遠行地不動地善慧地隨類饒益一切衆生寂滅忍有二佛與菩薩同依此忍下忍名菩薩上忍名為佛亦迷瓔珞四輪是借別義迷而以為圓位借高成下止觀第六引瓔珞云三觀初地現前今云何説在第八地或説在初住答借義相成或借高成下故言八地或借下成高故言初住輔行釋云借別八地成通教下借別初住成圓教高文在第十一玄文尚用名通義圓引經云我等今日真阿羅漢又我等今者真是聲聞此與藏通同而義異名別義圓五十二位與別同而初中後位俱妙也又云若名義俱圓如開示悟入非無賢聖玄文云三十心雖同有賢聖之義義稱為賢伏多斷少故十地去名為聖伏少斷多故又十住名賢聖二十心名聖賢十地等覺是聖妙覺是聖聖又別教十地名聖圓教十住亦名聖故高下不同耳因而引四念處從一開一玄文云十方佛土中唯有一乘法於此不解若欲開者開圓出別教一乘若於別不解者又開通一乘乃至藏一乘雖開為四皆名一大乘法云云此乃名同而體別疏別家因時三法縱橫果時三法亦縱橫常途只云因橫而果縱如下文疏云若但性德三如來是橫修德三如來是縱先法次報後應亦是縱已上正文而今文云因果各有縱橫義稍難見今引取止觀輔行釋之論云諸大乘師説法身正體有佛無佛本自有之非適今也了因般若無纍解脫此二當有此義縱也又云三德無前無後一體具足以體從義而有三異蓋體橫而義縱輔行釋云初師體唯法身次師體具三德雖具三德義同初師據體具邊復不相冥故成橫義以本有故名為體橫從修德故名為義縱又論云體義俱不殊而有隱顯之異俱不殊未免橫隱顯異未免縱輔行釋云體之與義俱從本有故云不殊據行證得復似前後故云隱顯法身一德在纏為隱出纏為顯餘之二德種子久具名之為隱究竟果滿名之為顯三德俱有此之二義本有三法俱名為橫俱有隱顯故俱名縱已上正文今以此文消通因果各有縱橫之義若法身本有餘二當有此乃縱也二德種子雖云久具復不相宜此乃橫也此名因中之縱橫也若法身出纏離障功由般若般若照明方起應用此乃縱也如玄文云別家報應但是相關不得相即此乃橫也此名果上之縱橫也砰礚上浦庚反下康礙反雷聲也張子平西京賦云礔礰激而增音砰礚象乎雷威大經純陀去後第二云是時純陀及其眷屬愁憂啼泣乃至尋與文殊從座而去共辦食具其去未久是時此地六種震動乃至梵世亦復如是應具述所表動表空遍動表假等遍動表中並闕心境宜於六根以示心境如云所謂彼眼根於諸如來常等空假中動不動三昧破四天王以三惑故動空破見思動假破塵沙動中破無明動亦有短長他土亦以照他土為短照尼吒等為長尼吒天阿之言無或云是無色天若楞嚴等經云是四禪色究竟天耳而涅槃疏具三釋彼云他解有頂但是梵世即尼吒天也無色無身不應聞聲故非有頂有人引仁王經云無色定力能變化作香華雲等以供養佛何以不能變化作身此亦堪難今作三番橫竪釋之一橫被六道堅徹三世二橫被四生竪徹三乘三橫被十界竪徹等覺故知不唯尼吒為有頂也若以三有之頂即非想是又三有之頂即無學是復有一頂即妙覺是此意既寬豈比梵世求其始終或説法為始得道為終上聖下凡亦可例求也七識住俱舍云身異及異想身異同一想復有三無色故識住有七論疏廣釋長阿含云或有衆生若干種身若干種想故天及人是初識住也或有衆生若干種身而一想者梵衆天最初生時是二識住或有衆生一身若于種想光音天是是三識住或有衆生一身一想遍淨天是是四識住或有衆生空處住識處住不用處住是名七識住又羅什釋云四趣多苦識不樂住以欲界人天合為一住初禪二禪三禪為住若四禪者色法少識不樂住空處識處無所有處為住若非非想處無色法小識亦不樂住疏各説身因涅槃經有比丘謂舍利弗言我未證解脫時意謂無明即是身因作是觀時得阿羅漢果有言愛是身因有説行識名色六入觸受愛取有生乃至飲食五欲等是身因舍利弗問佛誰為正説佛言無非正説經中引此是隨意自語覩外識內見外所行六度種種不同則知四教菩薩所解各別一切諸法皆名神變大神變經云佛現十八變竟時商主天子白佛頗有神變更過此耶文殊廣説變化已白佛言如是摧伏惡魔未為殊勝若無名相無聲字無戲論非沙門所知乃至云一切衆生無衆生佛土佛身亦復如是是名神變商主天子言若如是者一切諸法皆名神變身子問天子曰汝聞此不怖耶天子曰我即神變云何怖耶六即隨變隨觀而轉無垢施維摩詰亦翻無垢施昔問疾不堪今問疑乃堪大經師子法門經云師子發聲震吼為十一事一為壞詐師子二為欲試自力乃至九為調大象十為教諸子十一為莊嚴自眷屬故下合喻云摧破魔軍故示衆十力故餘九具合文在第一胸中大種所起種者水火風也今乃風種大論云風名優陀那觸臍而上去是風觸七處頂及齗齒唇舌喉及以胸是中言語生愚人不解此惑著起貪嗔然佛示同人法雖大種所起非惑著境須明行相明順逆十二因緣生滅等相知苦斷集證滅修道大略與聲聞同各各皆具四悉皆有所觀境智異故世界也皆輔佛揚化為人也皆破惑業對治也皆證真諦第一義也三乘約教準例可知約教一釋例有其四若別教三乘如瓔珞於菩薩乘義開為三圓教三乘如云我等今者真是聲聞等判開粗妙本迹觀心亦應可解本迹者本以佛聲令十界聞本住三覺迹示緣覺本住大悲滿足迹示三藏道心觀心者音聲性空非動靜境聲聞觀也緣起諸法當處寂滅緣覺觀也依無作諦發菩提心菩薩觀也同者略之之應作指蘭菊之言古諺云春蘭秋菊各自馨香從容釋之下經中説寂滅法三行偈文疏云或可成上見他上説方等中六度或別擬他土説方等後明大品教駟馬寶車禮記王玉輅以玉飾之又厭翟車以金飾之金玉皆寶故云寶車駟者馬也凡天子寶車皆聯四馬駕而引之教多在三如前分別前長行釋相貌中記云般若部是菩薩行也不云方等者以方等三同般若三小同鹿苑等別圓之前多不云教含二意一疏中至釋禪度方有別圓之言自禪度之前不云教含二蘇意為顯同疏與生死後際等淨名經云法施之會者無前無後一時供養一切衆生名為法施疏釋云前際即生死六道後際即四聖涅槃若觀色時一切法趣色色具中道十法界法一如無二如已上正文今意亦爾如是捨者十界俱捨得金剛身故云不壞等龍得一縷僧祇律中云有龍為金翅鳥所逐即取僧袈裟戴頂反為人形尋岸而行鳥亦化為婆羅門形追于龍後後有仙人在海岸上為龍鳥説法各相懺謝牛角一觸曾以角觸袈裟後改報為僧聞法等未見出處後更追注通為四境二忍通為四教觀境根本禪法界次第云四無量心背捨勝處神通變化及無漏觀慧種種諸禪三昧悉從四禪中而出故若達根本即成出世及出世上上止觀云若於禪中修不淨背捨等能發無漏成聲聞法也又勸棄欲名檀若不持戒三昧不現名尸得禪無瞑名忍禪心無雜名進知法無常名智此菩薩法也又諸禪是有支有支由取乃至老死是緣覺法也又觀此禪因緣生法即空是通聲聞菩薩等法又觀此禪因緣生法即空即假即中者成王三昧疏根本本離欲梵語禪此翻棄惡能棄欲界蓋纏等惡疏背捨亦修不淨等離欲八背捨中一內有色相外觀色者不滅內色謂不滅骨人也以不淨心觀外色者為修流光故此初背捨在初禪能捨自地及下地故名也二內無色相外觀色者謂滅內骨人以不淨心觀於外色所以然者為入二禪猶觀不淨之相也今疏意非但根本禪而能離欲八背捨中不淨觀等亦本離欲此藏通人之所通修也疏九定八勝十一切處入等傳傳為深八背之後辨勝處者八背捨觀雖棄五欲然於緣中未得自在欲得自在進修勝處謂一者內有色相外觀色少若好若醜二者內有色相外觀色多若好若醜等云云又八勝處後辨十一切處者雖八勝處轉變自在而未普遍今十一切處所觀乃遍也謂青一切處黃一切處等云云然背捨勝處十一切處並是觀禪未明練禪須於此後更修練禪等法若依法界次第九次第定在十一切處後列之今疏中九在八前疏未到慧多止觀云欲界定後或經年月定法持心無懈無痛從此心後泯然一轉虗豁不見欲界定中身首衣服牀鋪猶如虗空冏冏安隱身是事障事障未來障去身空未來得發故名未到地相也今言慧多者以能分別欲界定中身首虗空知是未到分明故四禪等如初禪中覺支觀支屬慧樂支一心支屬定前八屬慧後二屬定青黃赤白地水火風在四禪中練骨人流光故多屬慧空處識處既在無色界故多屬定各有降魔相大集經云天主初令諸軍次遣太子後遣三妃皆不能壞波旬後自領軍遂為佛所降若三藏佛伏四魔時在三祇百劫也三十四心破煩惱魔成佛入無餘破陰魔由破煩惱得法性身破死魔其餘三佛降魔之相準説初禪修悲易初起欲界具支林功德而却悲欲界故修悲易二禪修喜易有喜支故三禪修慈易三界之樂三禪為最四禪修捨易捨三禪樂不生悔心不捨菩提心名戒捨違本約不見心相生滅名忍忘生滅相求心不可得名進以來釋進離戲論名慧無四門諍我説布施至實相思益經云我依布施即示涅槃凡夫無智不能善解隨意所説作是思惟行於布施於未來世得大富貴而此法中無有一法可從一念至於一念若不從一念至於一念即是一切諸法實相不作不起戒體空寂忘作起相布施平等中慧空故能所忘矣不施不慳蔽度如幻能達一切法無所捨陰入皆如無苦可捨無所漏失本性無染具佛淨戒無所傷損一切諸法忍可不生平等名禪首楞嚴定生佛一際無所起相本經云一切法不分別名般若今云無所起相是則記主以所起釋分別耳何者若謂迷無明有凡起悟法性有聖起凡聖依正等差別而不了性是一者則非是圓教妙般若也或恐文誤起相本是精進耳彼云一切法無所起相名為勤行即是精進也六度各九如檀度中一自性施二一切施三難施乃至八此世他世樂施九清淨施自餘五度但改施名如云自性尸自性忍等肴葅葅應作爼音阻謂爼豆也若作葅乃側於反是淹菜耳或云肉是未制之前古人意云楞伽經中始制斷肉若楞伽經前尚通食肉故以肉施故片言繆彼經云佛告大慧有無量因緣不應食肉今當略説一切衆生從本已來常為六親以親故不應食肉衆生聞氣悉生怖畏如旃陀羅拘見憎惡驚怖群吠不應食肉等若説若觀至諸教共有教教諦理皆不可説悉檀因緣四皆可説若實智者亦四不可説權智可説又自行二智不可説化他二智可説教教義論故曰共有六度開合禪有願智開出願波羅蜜有神通開出力波羅蜜般若有道種智開出假智即方便波羅蜜有一切種智開中智即智波羅蜜自性戒體受法攝律儀利生饒益有情勸化衆生經中勸作勤自行修習行願進趣向果䇿進菩提巧會有無妙體空假不捨不受煩惱無所捨菩提無所受無想智經中想作明疏靈宇宇謂宮宇也漢帝置宮於甘泉西都賦云陪以甘泉乃有靈宇崇臺天子築之以候氣辟雍詩云乃經靈臺靈臺既崇峻階階陛也升樓臺必自陛曹子建七啓云華閣緣雲飛陛陵虗承露盤名也漢武帝惑神仙下立金莖上設仙人掌以擎銅盤承露飲之欲輕舉也西都賦云抗仙掌以承露棹雙立之金莖干雲干觸也謂樓臺高也漢書武帝造井幹樓高五十丈古詩云西北有高樓上與浮雲齊波利質多樹大經二十七云三十三天有波利質多樹其根入地深五由旬枝葉四布五十由旬其華開敷香氣周遍五十由旬光明遠照五十由旬若論總別仍同因光以光為總他土六瑞為別不豸豸宜加草單作者宅買反獸名也疏兩盈盈須從木楹柱也可東可西仲尼夢莫於兩楹以質彌勒質亦問也禮記云無欵不質行深從支遁買山從聽從也僧傳云竺法潛字法深晚還剡之仰山遂隱其迹于時支遁遣使求罥仰山之側沃洲小嶺潛答云欲來輒終豈聞巢由之買山乎疏因果廣略光宅以本迹對因果二門廣略如文儻若全取去法取喻是半更若取法謂全破惡進善對説法破惡兩兩進善開權顯實對進兵開權竪幢顯實標幟幟音熾旌旗也或作志音試並記號之義鼓體相續數數唱生五句並托喻從法合云三句言五者或從多為言耳利根深益在第二句吹螺句也準望三乘及鈍菩薩在雨兩句若進入第二句似超人耳容有昔時利鈍菩薩鈍聞今經始入十住利者昔入若聞今經進入十行並是改號義也若顯若密菩薩於昔顯入十住於今有始入者二乘於昔密入十住於今有始入者故云不同也三四二句第三句者二乘鈍菩薩聞今開權始入十住從住入行從行入向若利根人今經已前位入十行來至今經進入十向而亦有二乘利者前已密入若聞開權並賦兵位第四句準説當機結緣如玄文當機證位論開示等若結緣者本是地上清涼益進入解心或進觀行或進相似等無作一緣之中少分而已四分有十三重難障無作一邊罪二汙尼三賊心受戒四破內外道五黃門六殺父七殺母八殺羅漢九破僧十出佛血十一非人十二畜生十三二形男子即丈夫經云雖是丈夫若不聞佛性是名女人大經仍含三教佛性經中約位判味三藏者經云凡夫如乳須陀洹如酪斯陀含如生酥阿那含如熟酥阿羅漢辟支佛佛如醍醐通教者經云凡夫佛性如雜血乳須陀洹斯陀含斷少煩惱如真乳阿那含如酪阿羅漢如生酥支佛至十地如熟酥佛如醍醐別教者衆生如牛新生血乳未別聲聞緣覺如酪菩薩如生熟酥佛如醍醐並一往分別耳謂三周稟教是信行本門增念佛觀是法行皆一往耳然釋法號須從法立記云乘無二智來契正境名如來以無二理遍入諸法名應供了不二智智契無偏名正遍知等通列三號多陀翻如何伽度翻來此如來一號也阿羅訶翻應供此二號也三翻正藐翻等又三翻正佛陀翻覺即等正覺此三號也香口比丘迦葉佛時有一比丘為衆説法於大衆中讚迦葉佛由是命終生於天界於今釋迦如來滅度之後得阿羅漢果常有妙香從其口出時阿輸迦王問昔何因緣羅漢答云此非沉水栴檀等香由昔讚佛故爾四諦品經云苦聖諦者此娑婆世界中或名罪或名逼迫或名變易或名攀緣等集聖諦者此娑婆界或名繫縛或名滅壞或名愛著等乃至道滅有四百億十千名號隨衆生心悉令調伏諸佛子此娑婆世界中苦聖諦者彼密訓世界中或名營求根或名不出離乃至集滅道等亦有四百億十千名號最勝世界中豐溢世界中離垢世界中一一皆然隨衆生心悉令調伏今人老者所説非善片同時謬解法華者如前二千即二萬前釋二千人疏云觀色心具十法界界如互論即二千記云百界千如但成一千十界百界界界十如復應更以百如千界又名一千且如十如初後相在則十如為百用對十界豈非千界此且一往論其單數若百如中之千界界界十界百界中之千如如如十如何但界如各一千耶菩薩八萬疏云觀一善心具十法界十界交互具百法界千性相等十善即萬法約八正即八萬法門表權實滿用前約如論界約界論如以釋燈明在果表二萬權實滿從之如市甘蔍三擯出四太子一炬面二金色三象衆四別成是四太子至雪山北頓駕遂大樹蓊𣠵以德歸人不數年間蔚為強國其父嘆曰我子釋迦釋迦翻能仁又翻直林各領四天下金輪領四天下經言各者或是迭領金輪不值佛古人問云佛出減劫輪王出增劫如何彼佛有子作輪王耶答如釋迦應為輪王而於減劫成佛是也又如佉儴王命長而得見彌勒有是願力而得見也已上並柔公疏引古人云此亦不然如悲華經中有轉輪王名無諍念王有千子值寶藏佛授記此豈非金輪值佛華嚴十種彼經初住發心不同或見佛相好或覩佛神變或聞佛説法或聽教誡或見衆生受苦等猶同文殊同是菩薩可爾但彼是對告今是流通有人於此立四句計情未忘而於時節謂長謂短謂亦長亦短謂非長非短四姓剎帝利秦言土田主奕世王種婆羅門秦言外意謂淨行志道或在家或出家苦行多恃己術自我慢人毗舍謂商賈之種首陀謂農田之種楞伽乃密對菩薩彼經大慧菩薩問佛何故授聲聞記佛言有三意故一者為未入無餘界者密勸修菩薩行二者為此界他土樂聲聞乘者勸捨此心修大行故三者變化佛授化聲聞記非法性佛輔行第六云非法性佛者以實隔權故方等為斥奪聲聞方等陀羅尼經授記品云佛告五百大弟子衆汝當作佛同號寶月王如來云云爾時舍利弗問文殊師利言世尊弘慈授我等記不久當得菩提文殊師利我等當得菩提不文殊師利言猶如枯木更生枝不猶如山水還本處不猶如石折還可合不如焦種更生芽不舍利弗言不也實不可得文殊師利言若不可得汝云何問我當得菩提心生歡喜是授記法無有形相無有言語無有去來無有喜悅乃至云若能如是觀者乃名授菩提記舍利弗言若一切法空者世尊何以授我等記文殊師利言如來以如如性授汝等記不即是如不離是如不有不無不離色不即色乃至云是名如性舍利弗言不識是何言不知以何答默然而還詣本處坐經頗黎具云頗胝迦此翻水玉又云水精智論云出名山窟中過千年氷化成如西都華山出瑪瑙一坐三十四心若俱舍中樹王下時已斷前八地惑竟今一坐者取大論頓斷一念相應通佛成相妙玄云大功德力資於智慧一念相應如七生聞法尚滅至一生二生須陀洹人斷見惑竟若不值佛須經七生為惑所潤在欲界內若聞法者即能進斷欲惑故云尚滅等也言一生者即下三品惑謂聞法斷竟證不來果也二生者若斷中中成二果向進斷中下成一來果三果家家一來三果亦分利鈍妙玄云阿那含有二種一住果二勝進勝進那含斷五上分結謂色無色染等即阿羅漢向也羅漢但有一種謂住果也復次超果者在凡夫時斷欲界六品盡乃至八品盡來入見道發苦忍真明十五心中是斯陀含向十六心中即證斯陀含果也若凡夫時先斷二界九品盡乃至無所有處盡後入見諦十五心名阿那含行第十六心即證那含果此超越人也已上正文家家者欲惑九品能潤七生謂上上潤二生上中上下中上各潤一生中中中下共潤一生下三品共潤一生共七生也俱舍云斷欲三四品三二生家家斷五至二向斷六一來果輔行釋云斷上三品則損四生餘三生在為六品潤名三生家家進斷中上又損一生并前損五餘一生在名二生家家更斷中中未損一生但名二向更斷中下兼前中中成損六生餘下三品俱潤一生名一來果已上正文然所斷之惑有超有次在凡夫時若未得欲界定但次第斷也若已得欲界定隨伏多少進斷中下諸品惑者名超斷也故輔行云或修欲定欲惑未斷此人至十六心超斷五品名為家家是也一來者斯陀含人也從初果後更修十六諦觀七菩提行斷六品欲界結盡名一來也此亦次第人也若利根頓斷欲界下三品盡乃至無色盡名阿羅漢者亦超果人也今記主引此三類人並取利根以證地住人耳本迹四句淨名疏云本下迹高并本迹俱下初住唯得此之二句夫論迹者約有本説本為法身迹為八相初住之前無法身本故不得論本高迹下仍有過上故也又不得本迹俱高若本迹俱高及本高迹下妙覺唯得此之二句釋籤云二住已上等覺已還得具四句經護明珠或是明月珠也如魏王曰寡人有徑寸珠照車前後十二乘者十枚柔公引子書釋云人含智則嫉之蚌含珠則碎之意云蚌若護珠命則存矣人若破戒法身亡矣故喻之經天中天涅槃經中説五種天一假名天即人主也二生天即二十八天也三淨天即四果也四清淨天即十地菩薩五第一義天即佛也今佛超前四天名天中天又佛未出家地名為天中天經族旌家周禮五家為比五比為閭閭侶也二十五家相群侶也四閭為族謂多宗族也
