front:
  text: 法華經文句記箋難目次卷第一自序序品第一卷第二方便品第二譬喻品第三卷第三譬喻品之餘信解品第四藥草喻品第五授記品第六化城喻品第七五百弟子品第八學無學人記品第九法師品第十見寶塔品第十一提婆達多品第十二持品第十三卷第四安樂行品第十四從地涌出品第十五壽量品第十六分別功德品第十七隨喜功德品第十八法師功德品第十九常不輕菩薩品第二十如來神力品第二十一囑累品第二十二藥王菩薩本事品第二十三妙音菩薩品第二十四觀世音菩薩普門品第二十五陀羅尼品第二十六妙莊嚴王品第二十七普賢菩薩勸發品第二十八附法華隨經音切法華經文句記箋難目次終法華文句記箋難序法華經者魁雄於教部顯妙於本迹含生之實性彰矣覺王之大事畢矣以故其文句記習之者豈唯其理難其文也不易愚疇昔善植屢聽屢講蓋以賦性檮昧或聽或講凡有難文竊形箋註所貴離群索居垂暮之秋展卷無沉思之勞講貫得檢討之要若夫開權祕訣顯本遠旨綱三分裁截之要盡四科銷釋之美宗旨明矣無敢預焉今所箋者引文有影略者廣之前後有互指者示之傳寫筆誤者刊正之經文事相有不釋者輙釋之斥非隱約者申明之文字有罕識者音訓之析為十卷置諸儀衍以備忽忘脫或山中二三子得以讀之有以知今箋之之意亦旁助流通之毫善者蓋少免乎檢尋之勞耳其有闕疑洎檢文未見以俟來裔苟異日流落于外為博雅之士見之則知我以此罪我以此時皇宋元豐元年戊午歲摣菴有嚴序寶慶丁亥六月戊申朔十五日上竺住持鑑堂思義校勘法孫若重刊
